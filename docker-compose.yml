version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: meet-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meetclone
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - meet-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: meet-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - meet-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meet-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/meetclone?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "enterprise_level_jwt_secret_key_6a9b4d8c2e1f5"
      JWT_REFRESH_SECRET: "enterprise_level_jwt_refresh_secret_key_9f8e7d6c5b4a"
      FRONTEND_URL: "http://localhost:3000"
      NODE_ENV: "production"
    depends_on:
      - postgres
      - redis
    networks:
      - meet-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SIGNALING_URL=http://localhost:5000
    container_name: meet-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - meet-network
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:

networks:
  meet-network:
    driver: bridge
